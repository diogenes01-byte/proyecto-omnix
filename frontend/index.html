<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economic Intelligence Assistant</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo-container">
<div class="logo-icon">AI</div>
<h1>Omnix - Economic Insights</h1>
</div>

<div class="subtitle">
AI-powered economic data analysis and insights
</div>

</header>

<main>

<div class="chat-container">

<div class="message bot">

<div class="message-avatar">📊</div>

<div class="message-content">

<div class="message-text">
Hello. I can help analyze economic trends, policies, inflation, growth and macroeconomic indicators.
</div>

<div class="message-text">
Ask a question to begin the analysis.
</div>

</div>

</div>

</div>

</main>

<div class="input-wrapper">

<div class="input-container">

<textarea
id="user-input"
placeholder="Ask about inflation, GDP, interest rates or economic policy..."
></textarea>

<button class="send-btn">→</button>

</div>

<div class="hint">
Diseñado y desarrollado por Diógenes | Data Scientist & BI Strategist
</div>

</div>

<!-- Conexión con el script de JavaScript -->
<script src="script.js"></script>

</body>
</html>
